services:
  - type: web
    name: edge-preserving-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    rootDirectory: backend
    envVars:
      - key: MONGODB_URL
        sync: false # You will enter this on the Render site
      - key: SECRET_KEY
        generateValue: true
